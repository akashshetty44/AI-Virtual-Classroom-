<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Students List</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>
    <h1>👨‍🎓 Registered Students</h1>
</header>


<nav>
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/register">Register</a>
</nav>


<div class="container">

    <h2>Student Details</h2>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>USN</th>
            <th>Department</th>
            <th>Registered Date</th>
        </tr>


        {% for student in students %}

        <tr>
            <td>{{ student.id }}</td>
            <td>{{ student.name }}</td>
            <td>{{ student.usn }}</td>
            <td>{{ student.department }}</td>
            <td>{{ student.created_at }}</td>
        </tr>

        {% endfor %}


    </table>


    <br>

    <a href="/register">
        <button>
            Add New Student
        </button>
    </a>

</div>


<footer>
    <p>
        AI Virtual Classroom | Student Management
    </p>
</footer>


</body>
</html>
